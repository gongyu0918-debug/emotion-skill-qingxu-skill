interface:
  display_name: "情绪.skill / Emotion Skill"
  short_description: "让 Coding Agent 在修复、验证、收口之间自动切换：急了先动手，怀疑先给依据，担心越界就收紧 scope。"
  default_prompt: "Use $emotion-skill on coding-agent turns to read user state from the latest message, history, retries, and delay pressure. Apply the compact host output to set overlay_prompt, route reasons, response constraints, reply style, verification depth, queue mode, progress cadence, state deltas, and post-success guard behavior for repo debugging, scoped implementation, repeated-failure recovery, evidence-demanding review, and closeout."

policy:
  allow_implicit_invocation: true
